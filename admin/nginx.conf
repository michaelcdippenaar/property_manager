server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets (Vite fingerprinted filenames) — cache aggressively
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
    # Do NOT fall back to index.html — return 404 for missing chunks
    try_files $uri =404;
  }

  # index.html — never cache so new deploys take effect immediately
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    add_header Referrer-Policy "no-referrer" always;
  }

  # SPA routing — all other paths fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive, nosnippet" always;
    add_header Referrer-Policy "no-referrer" always;
  }
}
