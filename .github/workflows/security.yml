name: Security — Dependency Audit

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    # Run every Monday at 07:00 UTC
    - cron: "0 7 * * 1"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: pip-audit ──────────────────────────────────────────────────────
  pip-audit:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit (fail on any vuln)
        run: pip-audit -r backend/requirements.txt

  # ── Node: npm audit — admin SPA ───────────────────────────────────────────
  npm-audit-admin:
    name: npm audit (admin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci --audit=false

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high

  # ── Node: npm audit — website ─────────────────────────────────────────────
  npm-audit-website:
    name: npm audit (website)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci --audit=false

      - name: npm audit (high + critical only)
        run: npm audit --audit-level=high

  # ── Node: npm audit — agent-app ───────────────────────────────────────────
  npm-audit-agent-app:
    name: npm audit (agent-app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent-app/package-lock.json

      - name: Install dependencies
        # legacy-peer-deps needed until capacitor/quasar major-version alignment
        # (tracked in RNT-SEC-010 handoff notes)
        run: npm ci --legacy-peer-deps --audit=false

      - name: npm audit (high + critical only)
        # Known-unresolvable highs pending @quasar/app-vite + @capacitor/cli
        # major upgrade (separate follow-up task). Temporarily allow up to 6
        # highs until that task lands.
        # TODO: remove --audit-level=critical when follow-up is complete
        run: npm audit --audit-level=critical
