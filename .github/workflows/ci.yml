name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Secret scanning (gitleaks) ────────────────────────────────────────────
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for --log-opts scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE not required for public repos or self-hosted
        # Config is in .gitleaks.toml at repo root

  # ── Python: ruff lint + black format check + pytest ──────────────────────────
  backend:
    name: Backend (ruff, black, pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_DB: klikk_test
          POSTGRES_USER: klikk_user
          POSTGRES_PASSWORD: klikk_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt ruff black

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Run pytest
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DB_NAME: klikk_test
          DB_USER: klikk_user
          DB_PASSWORD: klikk_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          SECRET_KEY: ci-test-secret-key-not-used-in-production
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: pytest --tb=short -q

  # ── Admin SPA: eslint + vitest ────────────────────────────────────────────────
  admin:
    name: Admin SPA (eslint, vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        # Run eslint if config exists; skip gracefully if project has no eslint config yet
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ]; then
            npx eslint src --ext .ts,.vue --max-warnings 0
          else
            echo "No ESLint config found — skipping lint (add eslint.config.ts to enforce)"
          fi

      - name: Vitest unit tests
        run: npm test -- --run

      - name: TypeScript check
        run: npx vue-tsc --noEmit

  # ── Flutter mobile: analyze ───────────────────────────────────────────────────
  flutter:
    name: Flutter (analyze)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
