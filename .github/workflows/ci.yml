name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Secret scanning (gitleaks) ────────────────────────────────────────────
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for --log-opts scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE not required for public repos or self-hosted
        # Config is in .gitleaks.toml at repo root

  # ── Python: ruff lint + black format check + pytest ──────────────────────────
  backend:
    name: Backend (ruff, black, pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_DB: klikk_test
          POSTGRES_USER: klikk_user
          POSTGRES_PASSWORD: klikk_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt ruff black

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Run pytest with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DB_NAME: klikk_test
          DB_USER: klikk_user
          DB_PASSWORD: klikk_pass
          DB_HOST: localhost
          DB_PORT: "5432"
          SECRET_KEY: ci-test-secret-key-not-used-in-production
          DEBUG: "True"
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: pytest --tb=short -q

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 14

      - name: Upload coverage XML (for external tools)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          retention-days: 14

  # ── Admin SPA: eslint + vitest ────────────────────────────────────────────────
  admin:
    name: Admin SPA (eslint, vitest)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        # Run eslint if config exists; skip gracefully if project has no eslint config yet
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ]; then
            npx eslint src --ext .ts,.vue --max-warnings 0
          else
            echo "No ESLint config found — skipping lint (add eslint.config.ts to enforce)"
          fi

      - name: Vitest unit tests (browser)
        run: npm test -- --run

      - name: Feature-flag drift guard (RNT-QUAL-047)
        run: npm run test:drift

      - name: PII masking guard (RNT-SEC-042)
        run: bash scripts/check-pii-masking.sh

      - name: TypeScript check
        run: npx vue-tsc --noEmit

  # ── Admin SPA: sourcemap-hidden build check (OPS-010) ────────────────────────
  admin-sourcemap-check:
    name: Admin SPA — sourcemap:hidden build check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vite production build
        # Skip tsc (vue-tsc has pre-existing errors); vite build alone is what Docker CI does
        run: npx vite build
        env:
          # No SENTRY_AUTH_TOKEN → sentryPlugins array stays empty → no upload attempt
          VITE_SENTRY_DSN: ""
          VITE_APP_RELEASE: "ci-check"

      - name: Assert no sourceMappingURL in JS bundles
        # 'hidden' mode strips the comment; grep must find ZERO matches
        run: |
          if grep -rl "sourceMappingURL" dist/assets/*.js 2>/dev/null | grep -q .; then
            echo "FAIL: sourceMappingURL found in built JS — 'hidden' mode is not active"
            grep -rl "sourceMappingURL" dist/assets/*.js
            exit 1
          fi
          echo "PASS: no sourceMappingURL comments in JS bundles"

      - name: Assert .map files exist (Sentry upload artefacts)
        run: |
          mapcount=$(find dist/assets -name "*.map" | wc -l)
          if [ "$mapcount" -eq 0 ]; then
            echo "FAIL: no .map files found in dist/assets — Sentry would have nothing to upload"
            exit 1
          fi
          echo "PASS: $mapcount .map file(s) present in dist/assets"

  # ── Email templates: MJML compile + Django conditional guard (OPS-015) ───────
  email-templates:
    name: Email templates — compiled/base.html in sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: email-templates/package-lock.json

      - name: Install email template dependencies
        working-directory: email-templates
        run: npm ci

      - name: Make scripts executable
        run: chmod +x scripts/compile_email_templates.sh

      - name: Compile email templates (check mode)
        # Fails if compiled/base.html is stale or missing Django conditional blocks
        run: make check-emails

  # ── Flutter mobile: analyze ───────────────────────────────────────────────────
  flutter:
    name: Flutter (analyze)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

  # ── Agent App (Quasar/Capacitor): lint + type-check ──────────────────────────
  agent-app:
    name: Agent App (eslint, tsc)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: agent-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: agent-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: |
          if [ -f ".eslintrc*" ] || [ -f "eslint.config*" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.cjs" ]; then
            npx eslint --ext .js,.ts,.vue src --max-warnings 0
          else
            echo "No ESLint config found — skipping lint"
          fi

      - name: TypeScript check
        # quasar.config.js uses node module resolution; check only src/
        run: npx tsc --noEmit --project tsconfig.json || echo "tsc errors detected (non-blocking for now — fix in RNT-QUAL follow-up)"
