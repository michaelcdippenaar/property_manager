name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for this deploy (optional)"
        required: false
        default: ""

concurrency:
  group: staging-deploy
  cancel-in-progress: false   # Never cancel an in-flight deploy; queue instead

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: meta
        run: echo "version=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── backend ──────────────────────────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/klikk-backend:latest
            ghcr.io/${{ github.repository_owner }}/klikk-backend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── admin SPA ─────────────────────────────────────────────────────────────
      - name: Build & push admin
        uses: docker/build-push-action@v7
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          build-args: BUILD_MODE=staging
          tags: |
            ghcr.io/${{ github.repository_owner }}/klikk-admin:latest
            ghcr.io/${{ github.repository_owner }}/klikk-admin:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── agent app ─────────────────────────────────────────────────────────────
      - name: Build & push agent-app
        uses: docker/build-push-action@v7
        with:
          context: ./agent-app
          file: ./agent-app/Dockerfile
          push: true
          build-args: BUILD_MODE=staging
          tags: |
            ghcr.io/${{ github.repository_owner }}/klikk-agent-app:latest
            ghcr.io/${{ github.repository_owner }}/klikk-agent-app:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── marketing website ─────────────────────────────────────────────────────
      - name: Build & push website
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./website/Dockerfile
          push: true
          build-args: BUILD_MODE=staging
          tags: |
            ghcr.io/${{ github.repository_owner }}/klikk-website:latest
            ghcr.io/${{ github.repository_owner }}/klikk-website:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # ── Required GitHub secrets for this job ─────────────────────────────────
    # STAGING_HOST       IP or hostname of the staging server
    #                    Set to: 102.135.240.222  (klikk.co.za)
    # STAGING_SSH_USER   OS user on the staging server  (e.g. mc)
    # STAGING_SSH_KEY    Private key counterpart to a deploy key added to the
    #                    server's ~/.ssh/authorized_keys  (Ed25519 recommended)
    #                    Generate: ssh-keygen -t ed25519 -C "github-actions-staging"
    # STAGING_DOMAIN     Public domain used for the health-check smoke test
    #                    Set to: backend.klikk.co.za
    # GHCR_PAT           GitHub PAT with read:packages scope (for docker pull on server)
    # ─────────────────────────────────────────────────────────────────────────
    name: Deploy to staging server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging

    steps:
      - name: Add staging host to known_hosts
        # Runs ssh-keyscan against the server and caches the host key.
        # This step completing without timeout confirms public reachability.
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          # known_hosts was pre-populated by ssh-keyscan above
          envs: IMAGE_TAG,GHCR_OWNER,GHCR_PAT
          script: |
            set -e
            cd ~/apps/property_manager

            # Pull latest compose files and configs from this commit
            git pull --ff-only origin main

            # Log in to GHCR on the server — PAT is passed as an env var, never embedded
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_OWNER" --password-stdin

            # Pin images to the exact SHA tag so the server knows which version is running
            export BACKEND_IMAGE="ghcr.io/${GHCR_OWNER}/klikk-backend:${IMAGE_TAG}"
            export ADMIN_IMAGE="ghcr.io/${GHCR_OWNER}/klikk-admin:${IMAGE_TAG}"
            export AGENT_APP_IMAGE="ghcr.io/${GHCR_OWNER}/klikk-agent-app:${IMAGE_TAG}"
            export WEBSITE_IMAGE="ghcr.io/${GHCR_OWNER}/klikk-website:${IMAGE_TAG}"

            docker compose -f deploy/docker-compose.staging.yml pull backend admin_web agent_app_web website_web
            docker compose -f deploy/docker-compose.staging.yml up -d --remove-orphans

            # Run any pending migrations
            docker compose -f deploy/docker-compose.staging.yml exec -T backend \
              python manage.py migrate --noinput

            echo "Deployed commit ${IMAGE_TAG} to staging"
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}

      - name: Smoke-check staging health endpoint
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 \
            https://${{ secrets.STAGING_DOMAIN }}/api/v1/health/ \
            || (echo "Health check failed after deploy" && exit 1)
