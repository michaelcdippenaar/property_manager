# Pre-commit hooks for Klikk Rentals
#
# Install pre-commit: pip install pre-commit
# Activate in this repo: pre-commit install
# Run manually: pre-commit run --all-files
#
# The gitleaks hook scans staged changes for secrets before every commit.
# CI also runs gitleaks on full history — see .github/workflows/ci.yml.

repos:
  # ── Secret detection (gitleaks) ────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: "gitleaks: detect secrets"
        description: "Block commits that introduce credentials or API keys"
        # Uses .gitleaks.toml in repo root for allowlist rules

  # ── Email template: compiled/base.html sync check (OPS-015) ──────────────────
  - repo: local
    hooks:
      - id: check-email-templates
        name: "email-templates: compiled/base.html in sync with base.mjml"
        language: script
        entry: scripts/compile_email_templates.sh --check
        pass_filenames: false
        files: "^backend/apps/notifications/email_templates/"

  # ── Hardcoded credentials in LoginPage forms (RNT-SEC-045) ──────────────────
  - repo: local
    hooks:
      - id: check-hardcoded-credentials
        name: "hardcoded-credentials: block hardcoded credentials"
        language: script
        entry: scripts/check_hardcoded_credentials.sh
        files: "\\.(vue|ts|tsx)$"
        pass_filenames: false

  # ── Task board integrity guard (OPS-025) ────────────────────────────────────
  - repo: local
    hooks:
      - id: check-task-board-integrity
        name: "task-board: no duplicate or orphan task IDs"
        language: script
        entry: scripts/check_task_board_integrity.sh
        pass_filenames: false
        files: "^tasks/"

  # ── Trailing whitespace / file hygiene ─────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: "^.*\\.md$"
      - id: end-of-file-fixer
        exclude: "^agent-app/src-capacitor/"
      - id: check-merge-conflict
      - id: check-yaml
        exclude: "^deploy/"
      - id: detect-private-key
