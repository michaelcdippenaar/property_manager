version: "3.9"

# =============================================================================
#  Klikk — backup service
#
#  Runs nightly at 02:00 SAST (00:00 UTC) using supercronic inside a
#  lightweight Alpine container.  No web ports — internal network only.
#
#  How to add to your server (run alongside docker-compose.prod.yml or .staging.yml):
#
#    # Staging
#    docker compose \
#      -f deploy/docker-compose.staging.yml \
#      -f deploy/docker-compose.backup.yml \
#      up -d
#
#    # Production
#    docker compose \
#      -f deploy/docker-compose.prod.yml \
#      -f deploy/docker-compose.backup.yml \
#      up -d
#
#  Non-secret backup config comes from the env file (staging or production):
#    BACKUP_S3_BUCKET          klikk-backups-af (staging) / klikk-backups-af-prod (prod)
#    BACKUP_S3_PREFIX          klikk-staging / klikk-production
#    BACKUP_AWS_REGION         af-south-1
#
#  Required secrets in backend/.env.secrets:
#    BACKUP_ENCRYPTION_KEY     age1... recipient public key  (legacy: AGE_PUBLIC_KEY)
#    AWS_ACCESS_KEY_ID         IAM backup user (write + list, no delete)
#    AWS_SECRET_ACCESS_KEY     IAM backup user
#    SLACK_WEBHOOK_URL         (optional) incoming-webhook URL for failure alerts
#    ALERT_EMAIL               (optional) email address for failure alerts
#
#  Existing secrets re-used from backend/.env.secrets:
#    DB_PASSWORD / POSTGRES_PASSWORD
#
#  Graceful skip: if AWS credentials or BACKUP_ENCRYPTION_KEY are absent the
#  backup script exits 0 (non-fatal). Safe to deploy before infrastructure is
#  provisioned (e.g. in CI, staging bootstrap).
# =============================================================================

services:
  backup:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backup
    restart: unless-stopped
    env_file:
      - ../backend/.env.production   # DB_HOST, DB_PORT, DB_NAME, DB_USER, BACKUP_S3_BUCKET, BACKUP_AWS_REGION
      - ../backend/.env.secrets      # DB_PASSWORD, AWS creds, BACKUP_ENCRYPTION_KEY, alert channels
    environment:
      # backup.sh reads DB_PASSWORD but pg_dump needs PGPASSWORD
      PGPASSWORD: "${DB_PASSWORD}"
      MEDIA_DIR: /media
    volumes:
      # mount the Django media volume (read-only for backup)
      - media_data:/media:ro
      # persist supercronic logs between container restarts
      - backup_logs:/var/log/backup
    networks:
      - internal
    depends_on:
      - db

  # ── Cron reminder: monthly restore drill ───────────────────────────────────
  # Sends a Slack/email reminder on the 1st of each month to run the restore drill.
  # The drill itself is manual (see docs/ops/backup-restore.md).
  drill_reminder:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backup
    restart: unless-stopped
    env_file:
      - ../backend/.env.secrets
    command: ["supercronic", "/etc/crontab.drill"]
    volumes:
      - backup_logs:/var/log/backup
    networks:
      - internal

networks:
  internal:
    external: true
    name: deploy_internal   # must match the network name in docker-compose.prod.yml

volumes:
  media_data:
    external: true
    name: deploy_media_data   # must match the volume name in docker-compose.prod.yml
  backup_logs: {}
