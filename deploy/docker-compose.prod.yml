version: "3.9"

# Production compose — runs on the ISP-hosted VM.
# Mirrors staging exactly; update URLs in backend/.env when production domains differ.
#
# Before first run on the server:
#   cp backend/.env.secrets.example backend/.env.secrets
#   # fill in: SECRET_KEY, DB_PASSWORD, ANTHROPIC_API_KEY, EMAIL_HOST_PASSWORD
#   # (store the filled .env.secrets in Bitwarden under "Klikk → Production secrets")
#   docker compose -f deploy/docker-compose.prod.yml up -d
#   docker compose -f deploy/docker-compose.prod.yml exec backend python manage.py migrate
#   docker compose -f deploy/docker-compose.prod.yml exec backend python manage.py createsuperuser

services:
  # ── Database ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16.3
    restart: unless-stopped
    env_file:
      - ../backend/.env.secrets   # provides POSTGRES_PASSWORD directly
    environment:
      POSTGRES_DB: klikk_db
      POSTGRES_USER: klikk_user
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klikk_user -d klikk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API (ASGI via daphne) ──────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../backend/.env.production  # non-secret config — committed to git
      - ../backend/.env.secrets     # real passwords & keys — server-only
    environment:
      DB_HOST: db
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy
    networks: [internal, edge]
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Admin SPA (Vue 3) ─────────────────────────────────────────────────────
  admin_web:
    build:
      context: ../admin
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    restart: unless-stopped
    networks: [edge]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  # ── Marketing website (Astro) ─────────────────────────────────────────────
  website_web:
    build:
      context: ..
      dockerfile: website/Dockerfile
      args:
        BUILD_MODE: production
    restart: unless-stopped
    networks: [edge]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  # ── Agent mobile web (Quasar SPA) ────────────────────────────────────────
  agent_app_web:
    build:
      context: ../agent-app
      dockerfile: Dockerfile
      args:
        BUILD_MODE: production
    restart: unless-stopped
    networks: [edge]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  # ── PDF generation (Gotenberg) ───────────────────────────────────────────
  gotenberg:
    image: gotenberg/gotenberg:8.14
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--api-timeout=60s"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-file-access-from-files"
    networks: [internal]
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  # ── TLS reverse proxy (Caddy) ────────────────────────────────────────────
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      BASIC_AUTH_USER: "${BASIC_AUTH_USER:-}"
      BASIC_AUTH_HASH: "${BASIC_AUTH_HASH:-}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    depends_on:
      - admin_web
      - website_web
      - agent_app_web
      - backend

networks:
  internal: {}   # backend ↔ db, backend ↔ gotenberg (not exposed to Caddy)
  edge: {}       # caddy ↔ frontend containers + backend

volumes:
  postgres_data: {}
  caddy_data: {}
  caddy_config: {}
