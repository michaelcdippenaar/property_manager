# ═══════════════════════════════════════════════════════════════
# KLIKK LIFECYCLES
#
# Two lifecycle tracks:
#   rental_lifecycle  — 15 stages, one platform
#   sales_lifecycle   — Selling made simple
#
# Each step references a feature in features.yaml via feature_ref.
# Status is resolved from features.yaml — never duplicated here.
# ═══════════════════════════════════════════════════════════════

# ── KLIKK RENTALS — 15 stages, 4 phases, circular lifecycle ──
#
# The lifecycle is CIRCULAR: stage 14 (Notice) loops back to stage 1.
# Stages 1–7 happen while the previous tenant still occupies.
# Stages 8–11 are the overnight turnaround (move-out PM → move-in AM).
# Stages 12–14 are active tenancy (12 months).
# Stage 15 is closeout (deposit refund).
#
# Contract period: 1 Dec → 30 Nov (12-month fixed-term)
# Notice period: 2 months (marketing starts on notice date)

rental_lifecycle:
  # ── Phase A: Pre-Tenancy (during previous tenant's notice period) ──

  - step: 1
    phase: pre_tenancy
    title: Notice
    description: "Tenant or landlord gives 2-month written notice — triggers marketing"
    feature_ref: notice_management

  - step: 2
    phase: pre_tenancy
    title: Market
    description: "List vacancy on Property24, Private Property, social media"
    feature_ref: property_advertising

  - step: 3
    phase: pre_tenancy
    title: Viewings
    description: "Schedule and conduct property viewings while previous tenant occupies"
    feature_ref: property_viewings

  - step: 4
    phase: pre_tenancy
    title: Screen
    description: "AI scores applicants on credit, criminal, ID, employment, and rental history"
    feature_ref: tenant_screening

  - step: 5
    phase: pre_tenancy
    title: Lease
    description: "AI generates RHA-compliant lease, e-sign from any device"
    feature_ref: ai_lease_generation

  - step: 6
    phase: pre_tenancy
    title: Invoicing
    description: "Configure recurring rent schedule, escalation, payment method"
    feature_ref: rent_tracking

  - step: 7
    phase: pre_tenancy
    title: Deposit
    description: "Collect deposit + first month; lodge in interest-bearing account (interest accrues from lodging day)"
    feature_ref: deposit_management

  # ── Phase B: Turnaround (overnight — move-out PM to move-in AM) ──

  - step: 8
    phase: turnaround
    title: Move-Out
    description: "Joint outgoing inspection, photos, signed report, keys returned"
    feature_ref: outgoing_inspection

  - step: 9
    phase: turnaround
    title: Repairs
    description: "Overnight contractors work from snag list — clean, paint, fix"
    feature_ref: supplier_matching

  - step: 10
    phase: turnaround
    title: Move-In
    description: "Joint incoming inspection with photo evidence, signed report"
    feature_ref: incoming_inspection

  - step: 11
    phase: turnaround
    title: Onboard
    description: "Keys, utilities transfer, welcome pack, tenant portal setup"
    feature_ref: tenant_onboarding

  # ── Phase C: Active Tenancy (12 months) ──

  - step: 12
    phase: active_tenancy
    title: Rent
    description: "Monthly invoices, payment tracking, receipts on request"
    feature_ref: rent_tracking

  - step: 13
    phase: active_tenancy
    title: Maintain
    description: "AI triage, supplier matching, dispatch, tenant app tickets"
    feature_ref: supplier_matching

  - step: 14
    phase: active_tenancy
    title: Renew / Notice
    description: "Renewal notification at 80 biz days; renew, month-to-month, or vacate → loops to stage 1"
    feature_ref: lease_renewal

  # ── Phase D: Closeout ──

  - step: 15
    phase: closeout
    title: Refund
    description: "Itemised deposit refund with all accrued interest within 7/14/21 days"
    feature_ref: deposit_refund

# ── KLIKK REAL ESTATE — Selling made simple ─────────────────

sales_lifecycle:
  - step: 1
    title: Prospect
    description: "Find motivated sellers via referrals, farming, and digital leads"
    feature_ref: sales_prospecting

  - step: 2
    title: Valuate
    description: "Comparative Market Analysis and professional valuation"
    feature_ref: property_valuation

  - step: 3
    title: Sign Mandate
    description: "Sole, open, or dual mandate with mandatory disclosure"
    feature_ref: mandate_signing

  - step: 4
    title: List & Market
    description: "Property24, Private Property, social media, show days"
    feature_ref: sales_listing_marketing

  - step: 5
    title: Viewings
    description: "Show days, private viewings, buyer pre-screening"
    feature_ref: sales_viewings

  - step: 6
    title: Negotiate
    description: "Receive offers, counter-offer, agree on price and terms"
    feature_ref: offer_negotiation

  - step: 7
    title: Sign OTP
    description: "Execute Offer to Purchase with suspensive conditions"
    feature_ref: otp_signing

  - step: 8
    title: Buyer Documents
    description: "Collect FICA-compliant buyer documentation"
    feature_ref: buyer_documentation

  - step: 9
    title: Bond Approval
    description: "Track bond application, bank valuation, and approval"
    feature_ref: bond_approval_tracking

  - step: 10
    title: Legal & Compliance
    description: "Conveyancing, compliance certificates, rates and levy clearance"
    feature_ref: legal_compliance_certs

  - step: 11
    title: Transfer
    description: "Deeds Office registration, fund distribution, keys handover"
    feature_ref: property_transfer
