    property_types: any
    lease_types: any
  validation_regex: null
  example: casey@tester.example
  plain_english: >-
    Email for the third co-tenant — used for their e-signing invitation.
  related_legal_facts: []

- name: tenant_3_address
  label: Tenant 3 address
  category: tenant_3
  type: address
  required: false
  applicability:
    tenant_counts: [3]
    property_types: any
    lease_types: any
  validation_regex: null
  example: 99 Old Place, Stellenbosch, 7600
  plain_english: >-
    Current address for the third co-tenant before move-in.
  related_legal_facts:
