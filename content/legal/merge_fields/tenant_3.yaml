---
# Klikk lease merge fields — tenant_3 bucket.
# CRITICAL APPLICABILITY: tenant_counts: [3] only — NEVER 1 or 2.
# Front Door's `filter_by_context()` MUST drop these except when tenant_count == 3.

- name: tenant_3_name
  label: Tenant 3 full name
  category: tenant_3
  type: string
  required: false
  applicability:
    tenant_counts: [3]
    property_types: any
    lease_types: any
  validation_regex: null
  example: Casey Tester
  plain_english: >-
    Full legal name of the third co-tenant. Use ONLY when the user has
    explicitly named three tenants — never auto-populate this from the
    available-fields list.
  related_legal_facts:
    - rha-s5-3-a-parties

- name: tenant_3_id
  label: Tenant 3 SA ID number
  category: tenant_3
  type: sa_id_number
  required: false
  applicability:
    tenant_counts: [3]
    property_types: any
    lease_types: any
  validation_regex: '^\d{13}$'
  example: '9608054567085'
  plain_english: >-
    13-digit SA ID number for the third co-tenant.
  related_legal_facts: []

- name: tenant_3_phone
  label: Tenant 3 phone
  category: tenant_3
  type: phone
  required: false
  applicability:
    tenant_counts: [3]
    property_types: any
    lease_types: any
  validation_regex: null
  example: '+27 82 555 0103'
  plain_english: >-
    Phone number for the third co-tenant.
  related_legal_facts: []

- name: tenant_3_email
  label: Tenant 3 email
  category: tenant_3
  type: email
  required: false
