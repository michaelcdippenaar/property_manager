  plain_english: >-
    Unique EFT reference for the primary tenant's rental payments. Drives
    auto-reconciliation against the landlord bank account.
  related_legal_facts: []

- name: cotenant_1_payment_reference
  label: Co-tenant 1 payment reference (EFT)
  category: tenant_1
  type: string
  required: false
  applicability:
    tenant_counts: [1, 2, 3]
    property_types: any
    lease_types: any
  validation_regex: null
  example: LEASE-0001-T1
  plain_english: >-
    EFT reference for co-tenant 1 (the primary tenant). Exposed alongside
    `primary_tenant_payment_reference` for templates that use the
    `cotenant_N_*` naming throughout.
  related_legal_facts: []
