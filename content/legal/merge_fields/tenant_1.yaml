---
# Klikk lease merge fields — tenant_1 (numbered alias for the primary tenant).
# These coexist with the unsuffixed tenant_* fields so templates can use either
# naming convention. Always applicable for tenant counts 1, 2, 3.

- name: tenant_1_name
  label: Tenant 1 full name (alias for tenant_name)
  category: tenant_1
  type: string
  required: true
  applicability:
    tenant_counts: [1, 2, 3]
    property_types: any
    lease_types: any
  validation_regex: null
  example: Sam Tester
  plain_english: >-
    Numbered alias for the primary tenant. Use this naming convention in
    templates that explicitly enumerate multiple co-tenants. Same data as
    `tenant_name`.
  related_legal_facts:
    - rha-s5-3-a-parties

- name: tenant_1_id
  label: Tenant 1 SA ID number
  category: tenant_1
  type: sa_id_number
  required: true
  applicability:
    tenant_counts: [1, 2, 3]
    property_types: any
    lease_types: any
  validation_regex: '^\d{13}$'
  example: '9203124567083'
  plain_english: >-
    Tenant 1's 13-digit SA ID number. Required for FICA — without it the
    lease cannot satisfy customer due diligence for accountable
    institutions.
  related_legal_facts: []

- name: tenant_1_phone
  label: Tenant 1 phone
  category: tenant_1
  type: phone
  required: false
  applicability:
    tenant_counts: [1, 2, 3]
    property_types: any
    lease_types: any
  validation_regex: null
  example: '+27 82 555 0101'
  plain_english: >-
    Phone number for tenant 1. Same data as `tenant_phone`.
  related_legal_facts: []

- name: tenant_1_email
  label: Tenant 1 email
  category: tenant_1
  type: email
  required: false
  applicability:
    tenant_counts: [1, 2, 3]
    property_types: any
    lease_types: any
  validation_regex: null
  example: sam@tester.example
  plain_english: >-
    Email for tenant 1 — used for e-signing invitations. Same data as
    `tenant_email`.
  related_legal_facts: []

- name: tenant_1_address
  label: Tenant 1 address
  category: tenant_1
  type: address
  required: false
  applicability:
    tenant_counts: [1, 2, 3]
