    lease_types: any
  validation_regex: null
  example: 99 Old Place, Stellenbosch, 7600
  plain_english: >-
    Current address for tenant 1 (before move-in). Same data as
    `tenant_address`. Used for domicilium.
  related_legal_facts:
    - rha-s5-3-a-parties

