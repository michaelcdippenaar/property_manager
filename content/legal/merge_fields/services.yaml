---
# Klikk lease merge fields — property-services bucket (Feature 3).
# Structured arrangement flags + their human-readable label counterparts.

- name: water_arrangement
  label: 'Water arrangement key: included | not_included'
  category: services
  type: enum
  required: false
  applicability:
    tenant_counts: any
    property_types: any
    lease_types: any
  validation_regex: null
  example: not_included
  plain_english: >-
    Machine key for the water arrangement — `included` (water is part of
    rent) or `not_included` (tenant arranges separately).
  enum_values:
    - included
    - not_included
  related_legal_facts: []

- name: water_arrangement_label
  label: Water arrangement (human-readable)
  category: services
  type: string
  required: false
  applicability:
    tenant_counts: any
    property_types: any
    lease_types: any
  validation_regex: null
  example: Tenant arranges separately
  plain_english: >-
    Human-readable rendering of `water_arrangement` — what gets written
    into the lease body. Derived from the key by the Front Door.
  related_legal_facts: []

