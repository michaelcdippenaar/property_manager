citation_string: "POPIA s16"

statute_text: |
  A responsible party must take reasonably practicable steps to ensure that the personal
  information is complete, accurate, not misleading and updated where necessary. In taking
  the steps referred to, the responsible party must have regard to the purpose for which
  personal information is collected or further processed.
  [PARAPHRASED — verbatim text pending lawyer verification.]
