  (2026-04-17 vintage) and the Information Regulator's POPIA guidance notes.

plain_english_summary: |
  POPIA's accuracy condition. Any business that holds personal information
  must take reasonable steps to keep it complete, accurate, not misleading,
  and up to date — measured against the purpose for which the information
  was collected. This is the condition Klikk relies on when it gives a
  tenant the right to correct their own records, and the same condition
  that requires Klikk to maintain a tamper-evident audit trail of legal
  facts that are asserted in customer-facing output.

# Historic disagreement: lease-AI design doc previously cited s11(2) for
# the accuracy condition. The auditor flagged this as wrong; s11 is the
# top-level lawful-processing conditions and (2) is the consent-withdrawal
# clause. s16 is the substantive accuracy condition.
