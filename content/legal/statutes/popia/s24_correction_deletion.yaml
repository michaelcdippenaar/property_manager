section: "s24"
subsection_letter: null
parent_section: "s24"
citation_string: "POPIA s24"

statute_text: |
  A data subject may, in the prescribed manner, request a responsible party to correct or
  delete personal information about the data subject in its possession or under its control
  that is inaccurate, irrelevant, excessive, out of date, incomplete, misleading or obtained
  unlawfully, or to destroy or delete a record of personal information that the responsible
  party is no longer authorised to retain.
  [PARAPHRASED — verbatim text pending lawyer verification.]
statute_text_verbatim: false
