  (2026-04-17 vintage).

plain_english_summary: |
  Tenants and other data subjects have a statutory right under POPIA s24
  to ask Klikk to correct or delete personal information that is wrong,
  out of date, no-longer-relevant, excessive, misleading, or unlawfully
  obtained — and to destroy records the operator is no longer authorised
  to retain. Klikk must respond in the prescribed manner and within the
  prescribed time (Regulations to POPIA: 21 working days).

# Historic disagreement: lease-AI design doc previously cited s25 for
