citation_string: "RHA s5A"

statute_text: |
  The landlord must during the period of the lease maintain the existing structure
  of the dwelling in a state of repair so as to remain habitable, must give the
  tenant the necessary receipts in respect of all payments received from the tenant,
  and must not unfairly interfere with the tenant's right to privacy.
  [PARAPHRASED — verbatim text pending lawyer verification.]
