statute_text: |
  A complaint relating to an unfair practice may be lodged with the Rental Housing
  Tribunal. The Tribunal may, after hearing the matter, make a ruling that has the
  effect of an order of the Magistrate's Court and may impose a fine or order
  specific performance.
  [PARAPHRASED — verbatim text pending lawyer verification.]
