plain_english_summary: |
  Tenants and landlords lodge unfair-practice complaints under s13 with
  the Rental Housing Tribunal established by s7. The Tribunal hears the
  matter and issues a ruling that has the same legal force as a
  Magistrate's Court order — it may impose a fine, order the practice
  to stop, or order specific performance (e.g. return the deposit).

