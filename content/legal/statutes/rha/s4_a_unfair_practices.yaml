statute_text: |
  The Minister may, after consultation with the Provincial Ministers responsible for housing
  and by notice in the Gazette, prescribe unfair practices in relation to rental housing.
  Practices declared unfair under this section bind landlords and tenants, and a contravention
  may be referred to the Rental Housing Tribunal for relief, including financial penalty.
