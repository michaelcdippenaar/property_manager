plain_english_summary: |
  The Minister can publish a list of "unfair practices" landlords and tenants
  may not do. Anything on that list — and a number of common abuses such as
  excessive deposits, locking out a tenant, or arbitrary eviction — can be
  taken to the Rental Housing Tribunal, which can order the practice stopped
  and impose financial penalties.

