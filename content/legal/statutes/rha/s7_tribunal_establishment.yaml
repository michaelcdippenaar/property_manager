plain_english_summary: |
  Each provincial MEC for housing establishes a Rental Housing Tribunal
  under s7. The Tribunal is the cheap, accessible forum where rental
  disputes are resolved — separate from the Magistrate's Court. s7 is
  the ESTABLISHMENT section; the Tribunal's powers and procedure are
  in s13, which is a frequent source of citation confusion.

