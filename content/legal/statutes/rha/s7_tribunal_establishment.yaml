citation_string: "RHA s7"

statute_text: |
  The MEC for housing in each province must, by notice in the Provincial Gazette,
  establish a Rental Housing Tribunal for that province. The Tribunal consists of
  members appointed by the MEC and exercises jurisdiction over the rental housing
  matters set out in this Act.
  [PARAPHRASED — verbatim text pending lawyer verification.]
