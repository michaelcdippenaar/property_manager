statute_text: |
  The tenant must pay the rent timeously, must not damage the dwelling beyond
  fair wear and tear, must not sublet without the landlord's written consent
  unless the lease permits, and must comply with house rules forming part of
  the lease.
  [PARAPHRASED — verbatim text pending lawyer verification.]
