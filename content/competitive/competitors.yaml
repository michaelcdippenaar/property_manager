# ──────────────────────────────────────────
# Klikk positioning
# ──────────────────────────────────────────

klikk_differentiators:
  generative_ai:
    # AppFolio has predictive/workflow AI (Realm-X). NO competitor has generative LLM-powered AI.
    - "Tenant Chat AI (Claude API + RAG) — answers lease queries from your documents"
    - "Lease Builder AI (TipTap + Claude) — generates RHA-compliant leases from legislation"
    - "Document Parser AI — extracts structured data from municipal bills, FICA/CIPC docs"
    - "Supplier Matcher AI — match_score + match_reasons for maintenance requests"
  regulatory:
    - "Native e-signing (Gotenberg, ECTA s13 compliant, SHA-256 audit trail) — only Klikk + Talozen in SA"
    - "RHA-compliant lease generation (SA-specific; customisable templates for other jurisdictions)"
  mobile:
    - "Dedicated tenant mobile app (Flutter, native iOS + Android compilation — not a web wrapper)"
  platform:
    - "Full rental lifecycle in one platform"

klikk_gaps:
  critical:
    - Trust accounting (PayProp, WeConnectU, reOS, PropWorx, Buildium, Rent Manager all have this)
    - Bank reconciliation and payment processing
    - Tenant/owner statement generation
  high:
    - TPN tenant credit screening integration
    - Bulk payment processing (debit orders via Netcash)
    - Arrears management + automated reminders
  medium:
    - Sales module (PropWorx, Prop Data, Entegral, AppFolio, Rent Manager)
    - CRM / leads management
    - Property marketing / portal syndication
  low:
    - Franchise/franchisor portals
    - Microsoft 365 / Google Workspace integration

market_opportunity:
  generative_ai_moat:
    # AppFolio has predictive AI — this distinction is critical for positioning
    - "Generative AI (LLM-powered) vs. predictive AI — only Klikk uses Claude for chat, lease building, and document parsing"
    - "AppFolio's Realm-X automates workflows; Klikk's AI writes documents, answers questions, and extracts data — different capability tier"
    - "No SA competitor has ANY AI features — Klikk is the only AI-native property platform in SA"
  e_signing_moat:
    - "E-signing with ECTA s13 audit trail — only Klikk + Talozen in SA; none of the 5 international platforms have it"
    - "Talozen relies on PayProp/Xero integration; Klikk is self-contained (Gotenberg)"
  mobile_moat:
    - "Dedicated tenant mobile app — only MRI Rentbook (limited) and Klikk in SA market"
    - "DoorLoop has a mobile app but no SA presence; Klikk is the only SA platform with native iOS + Android"
  design_differentiation:
    - "DoorLoop uses near-identical navy+pink palette — differentiate via motion intensity (skeleton loaders, spring animations, glassmorphism)"
    - "Most SA platforms are 10+ years old (PropWorx 2004, PayProp 2004) — modern UX is itself a differentiator"
  underserved:
    - "Small landlords (1-5 properties) — only MRI Rentbook free tier; Klikk free tier would own this segment"
    - "Self-managing owners who don't use agencies — AI tenant chat + AI lease builder enables solo landlords"
    - "Dev/API-first buyers — Propertyware targets this; Klikk REST API + webhooks could compete here"
