# South African Property Management Software — Competitive Intelligence
# Last updated: 2026-04-14
# Source: Direct website scraping + market research

competitors:

  payprop:
    name: PayProp
    url: https://www.payprop.com/za
    founded: 2004
    hq: Cape Town, SA (also UK, US, Canada)
    tagline: Automated rental payment platform
    focus: Trust accounting + rent collection + disbursement
    clients: 1,300+ SA agencies
    volume: R62 billion annually
    pricing:
      model: "% of volume + license"
      setup: "R3,245 - R12,257"
      monthly_license: "R434"
      processing_fee: "<1.25% of rent processed"
      users: Unlimited included
    user_types:
      - Letting agents / rental agencies (primary)
      - Landlords (passive portal)
      - Tenants (payment portal)
    features:
      trust_accounting: true  # Core product — Absa-held trust accounts
      rent_collection: true   # Automated matching of incoming payments
      disbursements: true     # Same-day to landlords, contractors, commission
      arrears_management: true
      maintenance: basic      # Basic ticket system
      tenant_portal: true     # Branded self-service
      reporting: true         # Portfolio analytics + PayProp Rental Index
      lease_management: false
      inspections: false
      crm: false
      sales: false
      esigning: false
      ai_features: false
      mobile_app: false
      property_marketing: false
    integrations:
      - Averly (tenant screening)
      - PropertyInspect
      - TPN
      - Absa (banking)
      - API available
    compliance:
      ppra: true
      pasa: true
      trust_accounts: true
    strengths:
      - Market leader in automated rent processing
      - Rock-solid trust accounting
      - Processes R62B annually — proven at scale
      - Unlimited users included
    weaknesses:
      - No lease management or generation
      - No inspections
      - No CRM or property marketing
      - No e-signing
      - No AI
      - Web only — no mobile app

