[pytest]
DJANGO_SETTINGS_MODULE = config.settings.local
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = apps/test_hub tests
addopts = -v --tb=short --strict-markers --cov=apps --cov-report=term-missing --cov-report=html:htmlcov -p no:cacheprovider
markers =
    red: Test written before implementation — must xfail (strict)
    green: Implementation complete — must pass
    refactor: Code under refactor — must remain green
    unit: Fast isolated test, no DB required
    integration: Uses Django DB and API client
    e2e: Hits external services (Gotenberg, Firebase)
    slow: Known slow test
    flaky: Known intermittent — quarantined pending investigation
