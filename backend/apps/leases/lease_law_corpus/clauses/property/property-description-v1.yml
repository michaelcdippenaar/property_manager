notes: |
  Maps to RHA s5(3)(b) — description of the dwelling. Inspection-report
  reference satisfies s5(3)(k) joint-inspection requirement. Sectional
  title schemes should additionally annex the body-corporate conduct
  rules — see clause-sectional-title-csos-acknowledgement (Phase 2 Wave 2C).
