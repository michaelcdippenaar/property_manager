id: clause-property-description-v1
type: clause
version: 1
clause_title: Description of the Dwelling
clause_body: |
  The Landlord lets to the Tenant, and the Tenant hires from the
  Landlord, the following dwelling:

  {{ property_address }}{% if unit_number %}, Unit {{ unit_number }}{% endif %},
  {{ city }}, {{ province }} (hereinafter the "Property").

  {% if property_name %}The Property forms part of the {{ property_name }}
  scheme.{% endif %} The Property is let together with all fixtures,
  fittings and improvements present at the date of occupation, as
  recorded in the ingoing inspection report.

  The Tenant acknowledges that the Property has been inspected and is
  accepted in the condition recorded in the ingoing inspection report,
  fair wear and tear excepted.
topic_tags:
