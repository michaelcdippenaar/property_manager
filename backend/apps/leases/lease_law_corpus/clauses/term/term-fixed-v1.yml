id: clause-term-fixed-v1
type: clause
version: 1
clause_title: Term of Lease — Fixed Term
clause_body: |
  This lease shall commence on {{ lease_start_date }} and shall expire
  on {{ lease_end_date }} (the "Initial Term").

  Should the Tenant remain in occupation of the Property after the
  Initial Term with the express or tacit consent of the Landlord, the
  lease shall continue on a month-to-month basis on the same terms and
  conditions, terminable on not less than one (1) calendar month's
  written notice by either party.

  Where the Tenant is a natural person and the Landlord is in the
  business of letting residential property, the Tenant has the right
  under section 14 of the Consumer Protection Act 68 of 2008 to cancel
  this fixed-term lease on twenty (20) business days' written notice.
  The Landlord may, in such a case, impose a reasonable cancellation
  penalty proportionate to actual losses sustained — never the full
  outstanding rental for the remainder of the term.
