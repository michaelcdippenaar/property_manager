notes: |
  Maps to RHA s5(3)(d) — term / notice period. The s5(5) one-month
  default and the s5(6) tacit-consent continuation are baked in.
  CPA s14 penalty must be "reasonable" — Tribunal jurisprudence has
  struck down "remaining-rent" penalties as oppressive.
