id: clause-deposit-interest-bearing-account-v1
type: clause
version: 1
clause_title: Deposit — Interest-Bearing Account
clause_body: |
  The deposit referred to above (R{{ deposit }} —
  {{ deposit_words }}) shall be invested by the Landlord in an
  interest-bearing account with a registered South African financial
  institution. The account shall be held with {{ deposit_account_bank_name }}
  in the name of {{ deposit_account_holder }}. The interest accrued on
  the deposit, less any reasonable bank charges, accrues to the Tenant
  and may not be retained by the Landlord.

  The Tenant may, at any time during the lease and on reasonable
  written notice, request:

    (a) written proof from the financial institution that the deposit
        is held in the interest-bearing account contemplated above; and
    (b) a statement reflecting interest accrued to date.

  On termination of the lease, the deposit, together with the interest
  accrued, less any amounts lawfully deducted in terms of this lease and
  the Rental Housing Act, shall be paid to the Tenant in accordance
  with the refund-window clause.
