id: clause-deposit-amount-and-purpose-v1
type: clause
version: 1
clause_title: Deposit — Amount and Purpose
clause_body: |
  The Tenant shall pay to the Landlord a deposit of R{{ deposit }}
  ({{ deposit_words }}), being the equivalent of approximately one
  month's rent at the agreed monthly rental of R{{ monthly_rent }},
  payable on or before the commencement date of this lease and as a
  precondition to occupation.

  The deposit is held as security for:

    (a) the Tenant's punctual performance of all obligations under
        this lease, including the payment of rent, utility charges,
        and any other amounts due;
    (b) the reasonable cost of repairing any damage to the dwelling
        caused by the Tenant or any person occupying the dwelling
        with the Tenant's consent, save for fair wear and tear; and
    (c) the cost of replacing lost keys, access devices, or remotes
        issued to the Tenant.

  The deposit is NOT to be used as payment of the final month's rent.
  Any deduction from the deposit shall be itemised in writing and
  supported by receipts or quotations, in accordance with the Rental
  Housing Act and the move-out inspection clause of this lease.
