id: clause-parties-and-domicilium-v1
type: clause
version: 1
clause_title: Parties and Domicilium
clause_body: |
  This Residential Lease Agreement is entered into between:

  THE LANDLORD: {{ landlord_name }}, ID/Registration number
  {{ landlord_id }}, of {{ landlord_physical_address }} (hereinafter
  referred to as the "Landlord");

  and

  THE TENANT: {{ tenant_name }}, ID number {{ tenant_id }}, currently
  residing at {{ tenant_address }} (hereinafter referred to as the
  "Tenant").

  The parties choose the addresses set out above as their respective
  domicilia citandi et executandi (addresses for service of legal
  notices). Either party may change their address by written notice
  delivered to the other; the new address must be a physical address
  in the Republic of South Africa.
