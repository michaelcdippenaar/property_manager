notes: |
  Maps directly to RHA s5(3)(a) — names + addresses for service.
  Domicilium-citandi-et-executandi language is common law (Roman-Dutch)
  practice and survives both RHA and CPA. For 2+ tenant variants see
  clause-parties-multi-tenant-joint-and-several (Phase 2 Wave 2C).
