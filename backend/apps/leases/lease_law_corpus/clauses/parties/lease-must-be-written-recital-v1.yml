id: clause-lease-must-be-written-recital-v1
type: clause
version: 1
clause_title: Recital — Lease Reduced to Writing
clause_body: |
  WHEREAS the Landlord, {{ landlord_name }}, has agreed to let, and the
  Tenant, {{ tenant_name }}, has agreed to hire the residential
  dwelling situated at {{ property_address }} (hereinafter "the
  dwelling"), the parties have reduced their agreement to writing in
  accordance with section 5(2) of the Rental Housing Act 50 of 1999
  (as amended).

  This written lease, together with any annexures referenced herein,
  constitutes the entire agreement between the parties. No variation,
  amendment, or waiver of any term shall be of force or effect unless
  reduced to writing and signed by both parties or their duly
  authorised representatives.

  The parties acknowledge that the Tenant has received a copy of this
  lease before signature and has had a reasonable opportunity to read
  and seek advice on its contents.
