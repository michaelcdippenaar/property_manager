notes: |
  Section 5(2) of the RHA gives the tenant the right to a written
  lease on request. Many SA residential leases ship without an
  explicit recital — this clause makes the basis explicit and
  invokes the entire-agreement protection commonly relied upon
  before the Rental Housing Tribunal.
