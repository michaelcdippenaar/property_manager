notes: |
  Maps to RHA s5(3)(c) (rental amount + reasonable escalation) and
  s5(3)(g) (rent due date). EFT details are mandatory for the modern
  rental relationship. The payment-reference field disambiguates
  payments from multiple tenants on the same property — wire to the
  per-tenant-payment-reference merge field per the existing v1 fix
  (commit 580fb500-era).
