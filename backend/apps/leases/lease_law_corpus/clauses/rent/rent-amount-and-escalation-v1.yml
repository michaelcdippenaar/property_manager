id: clause-rent-amount-and-escalation-v1
type: clause
version: 1
clause_title: Rental Amount, Payment, and Escalation
clause_body: |
  The Tenant shall pay to the Landlord monthly rental of
  R{{ monthly_rent }} ({{ monthly_rent }} Rand) per month, payable
  monthly in advance on or before the first (1st) day of each month.

  Payment shall be made by electronic funds transfer to the Landlord's
  account at {{ landlord_bank_name }}, account number
  {{ landlord_bank_account_no }}, branch code
  {{ landlord_bank_branch_code }}, account holder
  {{ landlord_bank_account_holder }}, using payment reference
  "{{ primary_tenant_payment_reference }}". Proof of payment is the
  Tenant's responsibility.

  The monthly rental shall escalate annually on the anniversary of the
  lease commencement date by a fixed rate (the parties to agree, but
  typically 6%–10% per annum in line with prevailing SA market
  practice). No escalation may be imposed unilaterally during the
  Initial Term.

  Failure to pay rental on the due date constitutes a material breach
  of this lease, remedied by the breach and default clause below.
